<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>ENHYPEN Bias Experience</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ========================= -->
<!-- PAGE 1 -->
<!-- ========================= -->

<section id="welcomePage" class="page active">

    <div class="container">

        <img src="images/ot7.jpg"
             alt="ENHYPEN OT7"
             class="ot7-image">

        <h1>
            Welcome to the ENHYPEN Bias Experience
        </h1>

        <p>

            Discover your bias and learn interesting facts
            about your favorite ENHYPEN member!

        </p>

        <button id="startBtn">

            Start Journey

        </button>

    </div>

</section>


<!-- ========================= -->
<!-- PAGE 2 -->
<!-- ========================= -->

<section id="biasPage" class="page">

    <h2>

        Who is your Bias?

    </h2>

    <div class="member-grid">

        <div class="member-card" data-member="jay">
            <img src="images/jay.jpg">
            <h3>Jay</h3>
        </div>

        <div class="member-card" data-member="jungwon">
            <img src="images/jungwon.jpg">
            <h3>Jungwon</h3>
        </div>

        <div class="member-card" data-member="heeseung">
            <img src="images/heeseung.jpg">
            <h3>Heeseung</h3>
        </div>

        <div class="member-card" data-member="jake">
            <img src="images/jake.jpg">
            <h3>Jake</h3>
        </div>

        <div class="member-card" data-member="sunghoon">
            <img src="images/sunghoon.jpg">
            <h3>Sunghoon</h3>
        </div>

        <div class="member-card" data-member="sunoo">
            <img src="images/sunoo.jpg">
            <h3>Sunoo</h3>
        </div>

        <div class="member-card" data-member="niki">
            <img src="images/niki.jpg">
            <h3>Ni-ki</h3>
        </div>

    </div>

</section>



<!-- ========================= -->
<!-- PAGE 3 -->
<!-- ========================= -->

<section id="talentPage" class="page">

    <div class="container">

        <img id="talentImage"
             src=""
             alt="Member">

        <h2 id="talentTitle">

        </h2>

        <p id="talentDescription">

        </p>

        <button id="continueBtn">

            Continue

        </button>

    </div>

</section>




<!-- ========================= -->
<!-- PAGE 4 -->
<!-- ========================= -->

<section id="profilePage" class="page">

    <div class="container">

        <img id="profileImage"
             src=""
             alt="Member">

        <h2 id="profileName">

        </h2>

        <p id="birthday">

        </p>

        <p id="position">

        </p>

        <p id="nationality">

        </p>

        <p id="zodiac">

        </p>

        <p id="funFact">

        </p>

        <a id="knifeSong"
           href="#"
           target="_blank">

            🎵 Listen to Knife

        </a>

    </div>

</section>



<script src="script.js"></script>

</body>
  

</html>
